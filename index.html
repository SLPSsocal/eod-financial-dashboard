<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOD Financial Dashboard</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e2e8f0; --muted:#8892a4; --how:#4f8ef7; --rw:#22c55e; --fpi:#f59e0b; --dd:#ec4899; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }
  .header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; gap:16px; }
  .header h1 { font-size:18px; font-weight:600; }
  .subtitle { font-size:13px; color:var(--muted); }
  .tabs { display:flex; gap:2px; margin-left:auto; }
  .tab { padding:6px 16px; border-radius:6px; border:none; cursor:pointer; font-size:13px; font-weight:500; background:transparent; color:var(--muted); transition:all 0.15s; }
  .tab.active { background:#4f8ef720; color:var(--how); }
  .controls { padding:16px 24px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .controls label { font-size:13px; color:var(--muted); }
  .controls input[type=date] { background:var(--card); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:6px; font-size:13px; }
  .btn { padding:7px 20px; border-radius:6px; border:none; cursor:pointer; font-size:13px; font-weight:600; background:var(--how); color:#fff; transition:opacity 0.15s; }
  .btn:hover { opacity:0.85; } .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .main { padding:24px; }
  .page { display:none; } .page.active { display:block; }
  .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .eod-table { width:100%; border-collapse:collapse; font-size:14px; }
  .eod-table th, .eod-table td { padding:11px 18px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
  .eod-table th:first-child, .eod-table td:first-child { text-align:left; font-weight:500; color:var(--muted); width:1px; white-space:nowrap; padding-right:28px; }
  .eod-table thead th { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); background:#12141e; padding-top:14px; padding-bottom:14px; }
  .eod-table thead th.col-how { color:var(--how); } .eod-table thead th.col-rw { color:var(--rw); }
  .eod-table thead th.col-fpi { color:var(--fpi); } .eod-table thead th.col-dd { color:var(--dd); }
  .eod-table thead th.col-total { color:var(--text); }
  .eod-table tbody tr:hover { background:#ffffff05; }
  .eod-table tbody tr:last-child td { border-bottom:none; }
  .eod-table td { font-variant-numeric:tabular-nums; }
  .eod-table td.zero { color:#3a3f50; }
  .eod-table td.neg { color:#ef4444; }
  .eod-table tfoot td { border-top:2px solid var(--border); border-bottom:none; font-weight:700; font-size:15px; padding-top:14px; padding-bottom:14px; }
  .eod-table tfoot td:first-child { color:var(--text); }
  .eod-table .inv-row td { font-size:11px; color:var(--muted); border-bottom:2px solid var(--border); padding-top:5px; padding-bottom:10px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:8px; vertical-align:middle; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; }
  .chart-wrap { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:16px; }
  .chart-wrap h3 { font-size:14px; font-weight:600; margin-bottom:16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--how); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; margin-right:6px; }
  @media (max-width:600px) {
    .header { padding:12px 16px; } .header h1 { font-size:15px; }
    .controls { padding:12px 16px; } .main { padding:12px 16px; }
    .eod-table th, .eod-table td { padding:9px 12px; font-size:13px; }
    .eod-table th:first-child, .eod-table td:first-child { padding-right:16px; }
    .eod-table tfoot td { font-size:13px; }
  }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>EOD Financial Dashboard</h1>
    <div class="subtitle">House of Woof &middot; Riverwalk &middot; Four Paws Inn &middot; Don Doggos</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('eod')">EOD Report</button>
    <button class="tab" onclick="switchTab('trends')">Trends</button>
  </div>
</div>
<div class="controls">
  <label>Date</label>
  <input type="date" id="eod-date">
  <button class="btn" id="load-btn" onclick="loadEOD()">Load</button>
  <span id="status-text" style="font-size:12px;color:var(--muted)"></span>
</div>
<div class="main">
  <div class="page active" id="page-eod">
    <div class="table-wrap" id="table-wrap" style="display:none">
      <table class="eod-table">
        <thead>
          <tr>
            <th>Payment Method</th>
            <th class="col-how">HOW</th>
            <th class="col-rw">Riverwalk</th>
            <th class="col-fpi">FPI</th>
            <th class="col-dd">Don Doggos</th>
            <th class="col-total">Total</th>
          </tr>
          <tr class="inv-row">
            <td>Invoices</td>
            <td id="inv-how">&mdash;</td><td id="inv-rw">&mdash;</td>
            <td id="inv-fpi">&mdash;</td><td id="inv-dd">&mdash;</td>
            <td id="inv-total">&mdash;</td>
          </tr>
        </thead>
        <tbody id="eod-tbody"></tbody>
        <tfoot>
          <tr>
            <td>Net Total</td>
            <td id="net-how">&mdash;</td><td id="net-rw">&mdash;</td>
            <td id="net-fpi">&mdash;</td><td id="net-dd">&mdash;</td>
            <td id="net-total">&mdash;</td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div id="empty-msg" style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px">Select a date and click Load</div>
  </div>
  <div class="page" id="page-trends">
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <label style="font-size:13px;color:var(--muted)">From</label>
        <input type="date" id="trend-from" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px">
        <label style="font-size:13px;color:var(--muted)">To</label>
        <input type="date" id="trend-to" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px">
        <select id="trend-facility" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px">
          <option value="how">House of Woof</option><option value="rw">Riverwalk</option>
          <option value="fpi">Four Paws Inn</option><option value="dd">Don Doggos</option>
        </select>
        <button class="btn" onclick="loadTrends()">Load Trends</button>
      </div>
    </div>
    <div class="chart-wrap"><h3>Daily Net Revenue</h3><canvas id="trend-chart" height="280"></canvas></div>
    <div class="chart-wrap"><h3>Payment Method Breakdown</h3><canvas id="breakdown-chart" height="280"></canvas></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const FACILITIES = [
  { key:'how', name:'House of Woof', color:'#4f8ef7' },
  { key:'rw',  name:'Riverwalk',     color:'#22c55e' },
  { key:'fpi', name:'Four Paws Inn', color:'#f59e0b' },
  { key:'dd',  name:'Don Doggos',    color:'#ec4899' },
];
const PAYMENT_ROWS = [
  { key:'cardconnect',    label:'CardConnect',    color:'#6366f1' },
  { key:'helcim',         label:'Helcim',         color:'#14b8a6' },
  { key:'gingr_payments', label:'Gingr Payments', color:'#8b5cf6' },
  { key:'cash',           label:'Cash',           color:'#22c55e' },
  { key:'check',          label:'Check',          color:'#f59e0b' },
  { key:'store_credit',   label:'Store Credit',   color:'#06b6d4' },
  { key:'credit_card',    label:'Credit Card',    color:'#a78bfa' },
  { key:'refunds',        label:'Refunds',        color:'#ef4444' },
  { key:'other',          label:'Other',          color:'#94a3b8' },
];
const cache = {};

function fmt(n) {
  if (!n) return '<span class="zero">-</span>';
  const s = '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return n < 0 ? '<span class="neg">-' + s + '</span>' : s;
}
function fmtNet(n, color) {
  const s = '$' + Math.abs(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return '<span style="color:' + color + '">' + (n < 0 ? '-' : '') + s + '</span>';
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['eod','trends'][i] === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + tab));
}
function initDates() {
  const t = new Date(), y = new Date(t); y.setDate(y.getDate()-1);
  document.getElementById('eod-date').value = y.toISOString().split('T')[0];
  const m = new Date(t); m.setDate(m.getDate()-30);
  document.getElementById('trend-from').value = m.toISOString().split('T')[0];
  document.getElementById('trend-to').value = y.toISOString().split('T')[0];
}
async function apiFetch(facility, from_date, to_date) {
  const k = facility + '|' + from_date + '|' + to_date;
  if (cache[k]) return cache[k];
  const res = await fetch('/api/gingr-finance?facility=' + facility + '&from_date=' + from_date + '&to_date=' + to_date);
  const data = await res.json();
  if (data.success) cache[k] = data;
  return data;
}
function setLoading() {
  document.getElementById('eod-tbody').innerHTML = PAYMENT_ROWS.map(row =>
    '<tr><td><span class="dot" style="background:' + row.color + '"></span>' + row.label + '</td>' +
    '<td colspan="4" style="color:var(--muted)"><span class="spinner"></span>Loading...</td><td>&mdash;</td></tr>'
  ).join('');
  ['how','rw','fpi','dd','total'].forEach(k => {
    document.getElementById('inv-'+k).innerHTML = '&mdash;';
    document.getElementById('net-'+k).innerHTML = '&mdash;';
  });
  document.getElementById('table-wrap').style.display = '';
  document.getElementById('empty-msg').style.display = 'none';
}
function renderTable(results) {
  const tbody = document.getElementById('eod-tbody');
  tbody.innerHTML = PAYMENT_ROWS.map(row => {
    const cols = FACILITIES.map((fac, i) => {
      const r = results[i];
      if (!r || !r.success) return '<td class="zero">-</td>';
      const v = (r.totals && r.totals[row.key]) || 0;
      return '<td>' + fmt(v) + '</td>';
    }).join('');
    const total = results.reduce((sum, r) => sum + (r && r.success ? ((r.totals && r.totals[row.key]) || 0) : 0), 0);
    return '<tr><td><span class="dot" style="background:' + row.color + '"></span>' + row.label + '</td>' + cols + '<td>' + fmt(total) + '</td></tr>';
  }).join('');

  let totalInv = 0;
  FACILITIES.forEach((fac, i) => {
    const r = results[i];
    const n = r && r.success ? (r.invoice_count || 0) : null;
    document.getElementById('inv-'+fac.key).textContent = n !== null ? n + ' inv.' : '-';
    if (n) totalInv += n;
  });
  document.getElementById('inv-total').textContent = totalInv + ' inv.';

  let grand = 0;
  FACILITIES.forEach((fac, i) => {
    const r = results[i];
    const net = r && r.success ? (r.net_total || 0) : null;
    document.getElementById('net-'+fac.key).innerHTML = net !== null ? fmtNet(net, fac.color) : '&mdash;';
    if (net !== null) grand += net;
  });
  document.getElementById('net-total').innerHTML = fmtNet(grand, '#e2e8f0');
}
async function loadEOD() {
  const date = document.getElementById('eod-date').value;
  if (!date) return;
  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  document.getElementById('status-text').textContent = 'Loading...';
  setLoading();
  const results = await Promise.all(
    FACILITIES.map(f => apiFetch(f.key, date, date).catch(e => ({ success:false, error:e.message })))
  );
  renderTable(results);
  document.getElementById('status-text').textContent = results.filter(r => r && r.success).length + '/4 facilities loaded';
  btn.disabled = false;
}
let trendChart = null, breakdownChart = null;
async function loadTrends() {
  const from = document.getElementById('trend-from').value;
  const to = document.getElementById('trend-to').value;
  const facility = document.getElementById('trend-facility').value;
  if (!from || !to) return;
  const days = [];
  const cur = new Date(from+'T12:00:00Z'), end = new Date(to+'T12:00:00Z');
  while (cur <= end) { days.push(cur.toISOString().split('T')[0]); cur.setUTCDate(cur.getUTCDate()+1); }
  const results = await Promise.all(days.map(d => apiFetch(facility, d, d).catch(() => null)));
  const labels = days.map(d => new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'}));
  const fac = FACILITIES.find(f => f.key === facility);
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trend-chart'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'Net Revenue', data:results.map(r=>(r&&r.net_total)||0), backgroundColor:fac.color+'90', borderColor:fac.color, borderWidth:1 }] },
    options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'#2a2d3a'},ticks:{color:'#8892a4',maxRotation:45}}, y:{grid:{color:'#2a2d3a'},ticks:{color:'#8892a4',callback:v=>'$'+v.toLocaleString()}} } }
  });
  const agg = {};
  for (const r of results) { if (!r||!r.success) continue; for (const [k,v] of Object.entries(r.totals||{})) agg[k]=(agg[k]||0)+v; }
  const pmL=[], pmD=[], pmC=[];
  for (const row of PAYMENT_ROWS) { if (agg[row.key]>0) { pmL.push(row.label); pmD.push(Math.abs(agg[row.key])); pmC.push(row.color); } }
  if (breakdownChart) breakdownChart.destroy();
  breakdownChart = new Chart(document.getElementById('breakdown-chart'), {
    type:'doughnut',
    data:{ labels:pmL, datasets:[{ data:pmD, backgroundColor:pmC, borderColor:'#1a1d27', borderWidth:2 }] },
    options:{ responsive:true, plugins:{ legend:{labels:{color:'#e2e8f0',padding:16}}, tooltip:{callbacks:{label:ctx=>' '+ctx.label+': $'+ctx.raw.toLocaleString('en-US',{minimumFractionDigits:2})}} } }
  });
}
initDates();
</script>
</body>
</html>
